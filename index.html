<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>AKB 多元化音樂發廊</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500;600&display=swap');
*{font-family:'Noto Sans TC',sans-serif;box-sizing:border-box;}
.serif{font-family:'Noto Serif TC',serif;}
.gold{color:#C9A84C;}
.bg-gold{background:#C9A84C;}
.bg-gold-grad{background:linear-gradient(135deg,#C9A84C,#E8D5A3);}
.text-gold{color:#C9A84C;}
.border-gold{border-color:#C9A84C;}
.bg-dark{background:#0F0F0F;}
.bg-card{background:#1C1C1C;}
.bg-input{background:#252525;}
.text-muted{color:#888;}
.shimmer{background:linear-gradient(90deg,#C9A84C,#E8D5A3,#C9A84C);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-size:200%;}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:#1a1a1a;}
::-webkit-scrollbar-thumb{background:#C9A84C;border-radius:3px;}
input,select,textarea{background:#252525;border:1px solid #333;color:#fff;border-radius:8px;padding:10px 14px;width:100%;outline:none;transition:border 0.2s;}
input:focus,select:focus,textarea:focus{border-color:#C9A84C;box-shadow:0 0 0 3px rgba(201,168,76,.15);}
select option{background:#252525;}
.btn{cursor:pointer;transition:all 0.2s;border:none;font-weight:600;border-radius:8px;}
.btn-gold{background:linear-gradient(135deg,#C9A84C,#E8D5A3);color:#0F0F0F;padding:10px 24px;}
.btn-gold:hover{opacity:.85;transform:translateY(-1px);box-shadow:0 4px 14px rgba(201,168,76,.4);}
.btn-outline{background:transparent;color:#C9A84C;border:1px solid #C9A84C;padding:9px 22px;}
.btn-outline:hover{background:rgba(201,168,76,.1);}
.btn-ghost{background:transparent;color:#888;border:1px solid #333;padding:8px 16px;}
.btn-ghost:hover{border-color:#C9A84C;color:#C9A84C;}
.btn-danger{background:rgba(239,68,68,.1);color:#f87171;border:1px solid rgba(239,68,68,.3);padding:7px 14px;}
.btn-danger:hover{background:rgba(239,68,68,.2);}
.fade{animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.card{background:#1C1C1C;border:1px solid #2A2A2A;border-radius:12px;}
.badge-status{border-radius:6px;padding:3px 10px;font-size:11px;font-weight:600;}
.badge-confirmed{background:rgba(34,197,94,.15);color:#86EFAC;border:1px solid rgba(34,197,94,.3);}
.badge-pending{background:rgba(234,179,8,.15);color:#FDE047;border:1px solid rgba(234,179,8,.3);}
.badge-cancelled{background:rgba(239,68,68,.15);color:#FCA5A5;border:1px solid rgba(239,68,68,.3);}
.badge-done{background:rgba(99,102,241,.15);color:#C4B5FD;border:1px solid rgba(99,102,241,.3);}
.star{color:#C9A84C;}
.nav-tab{padding:10px 20px;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;color:#888;font-weight:500;}
.nav-tab:hover{color:#C9A84C;}
.nav-tab.active{border-color:#C9A84C;color:#C9A84C;}
.sidebar-item{padding:10px 16px;border-radius:8px;cursor:pointer;transition:all .2s;color:#888;display:flex;align-items:center;gap:10px;}
.sidebar-item:hover{background:#252525;color:#fff;}
.sidebar-item.active{background:rgba(201,168,76,.12);color:#C9A84C;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal-box{background:#1C1C1C;border:1px solid #333;border-radius:16px;width:100%;max-width:540px;max-height:90vh;overflow-y:auto;padding:28px;}
.step-dot{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;}
.step-done{background:rgba(201,168,76,.2);color:#C9A84C;border:2px solid #C9A84C;}
.step-current{background:linear-gradient(135deg,#C9A84C,#E8D5A3);color:#0F0F0F;}
.step-todo{background:#252525;color:#555;border:2px solid #333;}
.calendar-cell{padding:6px;text-align:center;cursor:pointer;border-radius:6px;transition:all .2s;font-size:13px;}
.calendar-cell:hover{background:#333;color:#fff;}
.calendar-cell.selected{background:linear-gradient(135deg,#C9A84C,#E8D5A3);color:#0F0F0F;font-weight:700;}
.calendar-cell.today{border:1px solid #C9A84C;color:#C9A84C;}
.calendar-cell.disabled{color:#444;cursor:not-allowed;}
.time-slot{padding:8px 12px;border:1px solid #333;border-radius:6px;cursor:pointer;transition:all .2s;font-size:13px;text-align:center;}
.time-slot:hover{border-color:#C9A84C;color:#C9A84C;}
.time-slot.selected{background:rgba(201,168,76,.15);border-color:#C9A84C;color:#C9A84C;font-weight:600;}
.time-slot.booked{background:#1a1a1a;color:#444;cursor:not-allowed;border-color:#2a2a2a;}
.designer-card{border-radius:12px;cursor:pointer;transition:all .25s;}
.designer-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.4);}
.designer-card.selected{border:2px solid #C9A84C!important;box-shadow:0 0 0 3px rgba(201,168,76,.2);}
.stat-card{border-radius:12px;padding:20px;position:relative;overflow:hidden;}
.stat-glow::after{content:'';position:absolute;width:80px;height:80px;border-radius:50%;top:-20px;right:-20px;filter:blur(30px);opacity:.3;}
.stat-gold::after{background:#C9A84C;}
.stat-green::after{background:#22C55E;}
.stat-blue::after{background:#3B82F6;}
.stat-purple::after{background:#8B5CF6;}
table{width:100%;border-collapse:collapse;}
th,td{padding:12px 14px;text-align:left;}
th{font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:#666;border-bottom:1px solid #2A2A2A;}
td{border-bottom:1px solid #1E1E1E;font-size:14px;}
tr:hover td{background:#252525;}
.tooltip{position:relative;}
.tooltip:hover::after{content:attr(data-tip);position:absolute;bottom:calc(100%+6px);left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:4px 10px;border-radius:5px;font-size:11px;white-space:nowrap;z-index:999;}
</style>
</head>
<body class="bg-dark text-white min-h-screen">
<div id="app"></div>

<script>
const { createApp, ref, reactive, computed, onMounted, watch } = Vue;

/* ==================== DATA ==================== */
const SERVICES = [
  { id:1, name:'剪髮造型', en:'Haircut & Style', price:600, duration:60, category:'基礎' },
  { id:2, name:'燙髮', en:'Perm', price:2800, duration:150, category:'進階' },
  { id:3, name:'染髮', en:'Color', price:2200, duration:120, category:'進階' },
  { id:4, name:'挑染 / 挑色', en:'Highlights', price:3200, duration:150, category:'進階' },
  { id:5, name:'護髮療程', en:'Hair Treatment', price:1200, duration:60, category:'護理' },
  { id:6, name:'頭皮 SPA', en:'Scalp SPA', price:900, duration:60, category:'護理' },
  { id:7, name:'全套音樂造型', en:'Music Style Package', price:4500, duration:180, category:'招牌' },
  { id:8, name:'新娘 / 特殊造型', en:'Bridal / Special', price:6800, duration:240, category:'特殊' },
];

const DESIGNERS = [
  { id:1, name:'Aika', role:'首席設計師', level:'A', specialty:['染髮','挑染','音樂造型'], bio:'擅長韓系潮流色彩，10年經驗，粉絲稱她為「調色魔法師」', avatar:'A', rating:4.9, reviews:142, works:320, available:true },
  { id:2, name:'Ken', role:'資深設計師', level:'B', specialty:['燙髮','護髮','男士剪髮'], bio:'韓式小臉燙&歐美捲專家，留學首爾5年歸國', avatar:'K', rating:4.8, reviews:98, works:215, available:true },
  { id:3, name:'Bella', role:'設計師', level:'C', specialty:['剪髮','頭皮SPA','護髮療程'], bio:'輕柔手法，細心聆聽每位客人需求', avatar:'B', rating:4.7, reviews:63, works:140, available:true },
  { id:4, name:'Jay', role:'資深設計師', level:'B', specialty:['染髮','新娘造型','特殊造型'], bio:'婚禮造型達人，已完成超過200組新娘', avatar:'J', rating:4.9, reviews:117, works:278, available:false },
  { id:5, name:'Mia', role:'設計師', level:'C', specialty:['剪髮','燙髮','頭皮SPA'], bio:'活潑開朗，擅長與客人溝通，讓你放鬆享受', avatar:'M', rating:4.6, reviews:45, works:98, available:true },
];

const CUSTOMERS = [
  { id:1, name:'王小明', phone:'0912-345-678', email:'ming@example.com', visits:12, lastVisit:'2026-03-10', notes:'對化學藥劑過敏，需確認', totalSpent:18400 },
  { id:2, name:'林美華', phone:'0923-456-789', email:'hua@example.com', visits:7, lastVisit:'2026-03-01', notes:'', totalSpent:9800 },
  { id:3, name:'陳佳琳', phone:'0934-567-890', email:'lin@example.com', visits:3, lastVisit:'2026-02-15', notes:'第一次做染髮', totalSpent:4200 },
  { id:4, name:'張志豪', phone:'0945-678-901', email:'hao@example.com', visits:20, lastVisit:'2026-03-18', notes:'VIP 客戶，生日3月20日', totalSpent:32500 },
  { id:5, name:'李雅婷', phone:'0956-789-012', email:'ting@example.com', visits:5, lastVisit:'2026-03-05', notes:'', totalSpent:7600 },
];

const genId = () => Date.now() + Math.random().toString(36).slice(2,6);

const INITIAL_BOOKINGS = [
  { id:'b1', customerId:1, customerName:'王小明', phone:'0912-345-678', designerId:1, designerName:'Aika', serviceId:4, serviceName:'挑染 / 挑色', date:'2026-03-25', time:'10:00', price:3200, duration:150, status:'confirmed', note:'想做玫瑰金', createdAt:'2026-03-15' },
  { id:'b2', customerId:2, customerName:'林美華', phone:'0923-456-789', designerId:3, designerName:'Bella', serviceId:5, serviceName:'護髮療程', date:'2026-03-25', time:'14:00', price:1200, duration:60, status:'confirmed', note:'', createdAt:'2026-03-16' },
  { id:'b3', customerId:4, customerName:'張志豪', phone:'0945-678-901', designerId:2, designerName:'Ken', serviceId:2, serviceName:'燙髮', date:'2026-03-26', time:'11:00', price:2800, duration:150, status:'pending', note:'希望有彈性捲', createdAt:'2026-03-17' },
  { id:'b4', customerId:3, customerName:'陳佳琳', phone:'0934-567-890', designerId:1, designerName:'Aika', serviceId:3, serviceName:'染髮', date:'2026-03-28', time:'13:00', price:2200, duration:120, status:'pending', note:'', createdAt:'2026-03-18' },
  { id:'b5', customerId:5, customerName:'李雅婷', phone:'0956-789-012', designerId:5, designerName:'Mia', serviceId:1, serviceName:'剪髮造型', date:'2026-03-22', time:'15:30', price:600, duration:60, status:'confirmed', note:'', createdAt:'2026-03-19' },
  { id:'b6', customerId:1, customerName:'王小明', phone:'0912-345-678', designerId:2, designerName:'Ken', serviceId:5, serviceName:'護髮療程', date:'2026-03-10', time:'10:00', price:1200, duration:60, status:'done', note:'', createdAt:'2026-03-05' },
];

/* ==================== APP ==================== */
const App = {
  setup() {
    const portal = ref('home'); // home | client | designer | admin | login
    const adminRole = ref(''); // store | designer-self
    const currentDesigner = ref(null);
    const adminLoggedIn = ref(false);

    const bookings = ref([...INITIAL_BOOKINGS]);
    const customers = ref([...CUSTOMERS]);
    const designers = ref([...DESIGNERS]);
    const services = ref([...SERVICES]);

    // ---- Booking flow state ----
    const bookingStep = ref(1);
    const bookingForm = reactive({ serviceId:null, designerId:null, date:'', time:'', name:'', phone:'', email:'', note:'' });
    const bookingDone = ref(null);

    // ---- UI states ----
    const showModal = ref('');
    const modalData = ref({});
    const adminTab = ref('dashboard');
    const designerTab = ref('schedule');
    const toast = ref({ show:false, msg:'', type:'success' });
    const searchQ = ref('');
    const calendarMonth = ref(3);
    const calendarYear = ref(2026);

    function showToast(msg, type='success') {
      toast.value = { show:true, msg, type };
      setTimeout(() => toast.value.show = false, 3000);
    }

    // ---- Calendar ----
    const calDays = computed(() => {
      const first = new Date(calendarYear.value, calendarMonth.value-1, 1).getDay();
      const total = new Date(calendarYear.value, calendarMonth.value, 0).getDate();
      return { first, total };
    });

    function selectDate(d) {
      if(d < 1) return;
      const m = String(calendarMonth.value).padStart(2,'0');
      const dd = String(d).padStart(2,'0');
      const dateStr = `${calendarYear.value}-${m}-${dd}`;
      const today = new Date(); today.setHours(0,0,0,0);
      if(new Date(dateStr) < today) return;
      bookingForm.date = dateStr;
      bookingForm.time = '';
    }

    function isDatePast(d) {
      if(d < 1) return true;
      const m = String(calendarMonth.value).padStart(2,'0');
      const dd = String(d).padStart(2,'0');
      const today = new Date(); today.setHours(0,0,0,0);
      return new Date(`${calendarYear.value}-${m}-${dd}`) < today;
    }

    function isTodayD(d) {
      const now = new Date();
      return now.getFullYear()===calendarYear.value && now.getMonth()+1===calendarMonth.value && now.getDate()===d;
    }

    function isSelectedD(d) {
      if(!bookingForm.date) return false;
      const m = String(calendarMonth.value).padStart(2,'0');
      const dd = String(d).padStart(2,'0');
      return bookingForm.date === `${calendarYear.value}-${m}-${dd}`;
    }

    // Time slots
    const ALL_TIMES = ['09:00','10:00','11:00','12:00','13:00','14:00','15:00','16:00','17:00','18:00','19:00'];
    function isTimeBooked(t) {
      if(!bookingForm.date || !bookingForm.designerId) return false;
      return bookings.value.some(b => b.designerId===bookingForm.designerId && b.date===bookingForm.date && b.time===t && b.status!=='cancelled');
    }

    // ---- Stats ----
    const stats = computed(() => {
      const today = new Date().toISOString().slice(0,10);
      const thisMonth = today.slice(0,7);
      return {
        todayBookings: bookings.value.filter(b=>b.date===today && b.status!=='cancelled').length,
        monthRevenue: bookings.value.filter(b=>b.date.startsWith(thisMonth) && (b.status==='confirmed'||b.status==='done')).reduce((a,c)=>a+c.price,0),
        totalCustomers: customers.value.length,
        pendingCount: bookings.value.filter(b=>b.status==='pending').length,
      };
    });

    // ---- Book submit ----
    function submitBooking() {
      const svc = services.value.find(s=>s.id===bookingForm.serviceId);
      const des = designers.value.find(d=>d.id===bookingForm.designerId);
      const newB = {
        id: genId(),
        customerId: null,
        customerName: bookingForm.name,
        phone: bookingForm.phone,
        email: bookingForm.email,
        designerId: bookingForm.designerId,
        designerName: des.name,
        serviceId: bookingForm.serviceId,
        serviceName: svc.name,
        date: bookingForm.date,
        time: bookingForm.time,
        price: svc.price,
        duration: svc.duration,
        status: 'pending',
        note: bookingForm.note,
        createdAt: new Date().toISOString().slice(0,10),
      };
      bookings.value.unshift(newB);
      bookingDone.value = newB;
      bookingStep.value = 5;
      showToast('預約成功！已發送確認通知');
    }

    function resetBooking() {
      Object.assign(bookingForm, { serviceId:null, designerId:null, date:'', time:'', name:'', phone:'', email:'', note:'' });
      bookingStep.value = 1;
      bookingDone.value = null;
    }

    // ---- Admin actions ----
    function updateBookingStatus(id, status) {
      const b = bookings.value.find(x=>x.id===id);
      if(b) { b.status = status; showToast(`預約狀態已更新為「${statusLabel(status)}」`); }
    }

    function statusLabel(s) {
      return { confirmed:'已確認', pending:'待確認', cancelled:'已取消', done:'已完成' }[s] || s;
    }

    function statusClass(s) {
      return { confirmed:'badge-confirmed', pending:'badge-pending', cancelled:'badge-cancelled', done:'badge-done' }[s] || '';
    }

    const filteredBookings = computed(() => {
      let list = bookings.value;
      if(searchQ.value) {
        const q = searchQ.value.toLowerCase();
        list = list.filter(b => b.customerName.toLowerCase().includes(q) || b.designerName.toLowerCase().includes(q) || b.serviceName.toLowerCase().includes(q) || b.phone.includes(q));
      }
      return list.sort((a,b)=>a.date<b.date?-1:a.date>b.date?1:0);
    });

    const designerBookings = computed(() => {
      if(!currentDesigner.value) return [];
      return bookings.value.filter(b=>b.designerId===currentDesigner.value.id).sort((a,b)=>a.date<b.date?-1:1);
    });

    function designerLogin(d) {
      currentDesigner.value = d;
      adminRole.value = 'designer-self';
      portal.value = 'designer';
      adminLoggedIn.value = true;
    }

    function adminLogin() {
      adminRole.value = 'store';
      portal.value = 'admin';
      adminLoggedIn.value = true;
    }

    function logout() {
      portal.value = 'home';
      adminLoggedIn.value = false;
      adminRole.value = '';
      currentDesigner.value = null;
      adminTab.value = 'dashboard';
      designerTab.value = 'schedule';
    }

    // ---- Service management ----
    const editService = reactive({ show:false, id:null, name:'', price:600, duration:60, category:'基礎', en:'' });
    function openEditService(s) {
      Object.assign(editService, { show:true, id:s?s.id:null, name:s?s.name:'', price:s?s.price:600, duration:s?s.duration:60, category:s?s.category:'基礎', en:s?s.en:'' });
    }
    function saveService() {
      if(!editService.name) return;
      if(editService.id) {
        const s = services.value.find(x=>x.id===editService.id);
        if(s) Object.assign(s, { name:editService.name, price:editService.price, duration:editService.duration, category:editService.category, en:editService.en });
      } else {
        services.value.push({ id:Date.now(), name:editService.name, price:editService.price, duration:editService.duration, category:editService.category, en:editService.en });
      }
      editService.show = false;
      showToast('服務項目已儲存');
    }

    // ---- Designer management ----
    const editDesigner = reactive({ show:false, id:null, name:'', role:'設計師', level:'C', specialty:'', bio:'', available:true });
    function openEditDesigner(d) {
      Object.assign(editDesigner, { show:true, id:d?d.id:null, name:d?d.name:'', role:d?d.role:'設計師', level:d?d.level:'C', specialty:d?d.specialty.join('、'):'', bio:d?d.bio:'', available:d?d.available:true });
    }
    function saveDesigner() {
      if(!editDesigner.name) return;
      if(editDesigner.id) {
        const d = designers.value.find(x=>x.id===editDesigner.id);
        if(d) Object.assign(d, { name:editDesigner.name, role:editDesigner.role, level:editDesigner.level, specialty:editDesigner.specialty.split('、').filter(Boolean), bio:editDesigner.bio, available:editDesigner.available });
      } else {
        designers.value.push({ id:Date.now(), name:editDesigner.name, role:editDesigner.role, level:editDesigner.level, specialty:editDesigner.specialty.split('、').filter(Boolean), bio:editDesigner.bio, avatar:editDesigner.name[0], rating:5.0, reviews:0, works:0, available:editDesigner.available });
      }
      editDesigner.show = false;
      showToast('設計師資料已儲存');
    }

    // ---- Weekly schedule for designer ----
    function getDesignerSchedule(designerId) {
      const now = new Date();
      const slots = [];
      for(let i=0; i<7; i++) {
        const d = new Date(now); d.setDate(now.getDate()+i);
        const dateStr = d.toISOString().slice(0,10);
        const dayBookings = bookings.value.filter(b=>b.designerId===designerId && b.date===dateStr && b.status!=='cancelled');
        slots.push({ date:dateStr, day:['日','一','二','三','四','五','六'][d.getDay()], bookings:dayBookings });
      }
      return slots;
    }

    return {
      portal, adminRole, currentDesigner, adminLoggedIn,
      bookings, customers, designers, services,
      bookingStep, bookingForm, bookingDone,
      showModal, modalData, adminTab, designerTab,
      toast, searchQ, calendarMonth, calendarYear,
      stats, calDays, filteredBookings, designerBookings,
      ALL_TIMES, SERVICES, DESIGNERS,
      selectDate, isDatePast, isTodayD, isSelectedD, isTimeBooked,
      submitBooking, resetBooking,
      updateBookingStatus, statusLabel, statusClass,
      designerLogin, adminLogin, logout,
      editService, openEditService, saveService,
      editDesigner, openEditDesigner, saveDesigner,
      getDesignerSchedule, showToast,
    };
  },
  template: `
<!-- TOAST -->
<transition name="fade">
  <div v-if="toast.show" :class="['fixed top-5 right-5 z-[200] px-5 py-3 rounded-xl shadow-2xl text-sm font-semibold fade flex items-center gap-2',toast.type==='success'?'bg-green-900/90 text-green-300 border border-green-700':'bg-red-900/90 text-red-300 border border-red-700']">
    <span v-if="toast.type==='success'">✓</span><span v-else>✗</span>
    {{toast.msg}}
  </div>
</transition>

<!-- ===== HOME PORTAL ===== -->
<div v-if="portal==='home'" class="min-h-screen flex flex-col items-center justify-center bg-dark fade" style="background:radial-gradient(ellipse at top,#1a1400 0%,#0F0F0F 60%)">
  <div class="text-center mb-12">
    <div class="text-5xl font-bold serif shimmer mb-3">AKB</div>
    <div class="text-xl text-gold font-semibold tracking-widest mb-2">多元化音樂發廊</div>
    <div class="text-muted text-sm tracking-wider">Music • Style • Identity</div>
  </div>
  <div class="grid grid-cols-1 gap-5 w-full max-w-xs px-6">
    <button class="btn btn-gold py-4 text-base flex items-center justify-center gap-3 fade" style="animation-delay:.05s" @click="portal='client'">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      客戶預約
    </button>
    <button class="btn btn-outline py-4 text-base flex items-center justify-center gap-3 fade" style="animation-delay:.1s" @click="portal='login'">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v4m0 14v4M4.22 4.22l2.83 2.83m9.9 9.9 2.83 2.83M1 12h4m14 0h4M4.22 19.78l2.83-2.83m9.9-9.9 2.83-2.83"/></svg>
      設計師 / 店家登入
    </button>
  </div>
  <div class="mt-16 text-center text-muted text-xs">
    <div class="mb-1">📍 台北市信義區音樂路88號</div>
    <div>☎ 02-2345-6789 &nbsp;|&nbsp; 週二～週日 10:00–20:00</div>
  </div>
</div>

<!-- ===== LOGIN ===== -->
<div v-if="portal==='login'" class="min-h-screen flex items-center justify-center bg-dark fade" style="background:radial-gradient(ellipse at top,#1a1400 0%,#0F0F0F 60%)">
  <div class="w-full max-w-sm px-6">
    <button @click="portal='home'" class="btn btn-ghost mb-6 text-sm">← 返回首頁</button>
    <div class="card p-8">
      <div class="text-2xl font-bold serif gold mb-1">登入系統</div>
      <div class="text-muted text-sm mb-7">選擇您的身份進入管理頁面</div>
      <div class="space-y-3 mb-6">
        <div class="text-xs text-muted mb-2 uppercase tracking-wider">設計師登入</div>
        <div v-for="d in designers" :key="d.id" class="flex items-center justify-between p-3 rounded-xl cursor-pointer transition-all" style="background:#252525;border:1px solid #333" @click="designerLogin(d)" @mouseover="$event.target.closest('div').style.borderColor='#C9A84C'" @mouseout="$event.target.closest('div').style.borderColor='#333'">
          <div class="flex items-center gap-3">
            <div class="w-9 h-9 rounded-full bg-gold-grad flex items-center justify-center font-bold text-black bg-gold text-sm">{{d.avatar}}</div>
            <div>
              <div class="font-semibold text-sm">{{d.name}}</div>
              <div class="text-muted text-xs">{{d.role}}</div>
            </div>
          </div>
          <div :class="['text-xs px-2 py-1 rounded-full',d.available?'text-green-400 bg-green-900/30':'text-red-400 bg-red-900/30']">{{d.available?'上班中':'休假中'}}</div>
        </div>
      </div>
      <div class="border-t border-gray-800 pt-5">
        <button class="btn btn-gold w-full py-3" @click="adminLogin()">店家管理員後台</button>
      </div>
    </div>
  </div>
</div>

<!-- ===== CLIENT PORTAL ===== -->
<div v-if="portal==='client'" class="min-h-screen bg-dark fade">
  <!-- Header -->
  <header class="border-b border-gray-800 sticky top-0 z-50" style="background:rgba(15,15,15,.95);backdrop-filter:blur(12px)">
    <div class="max-w-5xl mx-auto px-4 py-4 flex items-center justify-between">
      <button @click="portal='home'" class="flex items-center gap-2 text-muted hover:text-gold transition-colors">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
        <span class="font-bold serif text-lg text-white">AKB 發廊</span>
      </button>
      <div class="flex gap-1">
        <button :class="['nav-tab text-sm',bookingStep>0?'':'']" @click="bookingStep===5?resetBooking():null">預約服務</button>
        <button class="nav-tab text-sm" @click="showModal='designers'">認識設計師</button>
      </div>
    </div>
  </header>

  <!-- Step indicator -->
  <div class="max-w-2xl mx-auto px-4 pt-8 pb-4">
    <div v-if="bookingStep<5" class="flex items-center justify-center gap-2 mb-8 text-xs">
      <template v-for="n in [1,2,3,4]" :key="n">
        <div :class="['step-dot',n<bookingStep?'step-done':n===bookingStep?'step-current':'step-todo']">
          <span v-if="n<bookingStep">✓</span>
          <span v-else>{{n}}</span>
        </div>
        <div v-if="n<4" :class="['h-px w-10 transition-all',n<bookingStep?'bg-gold':'bg-gray-700']"></div>
      </template>
      <div class="ml-3 text-muted">
        {{['選擇服務','選擇設計師','選擇時間','填寫資料'][bookingStep-1]}}
      </div>
    </div>

    <!-- Step 1: Service -->
    <div v-if="bookingStep===1" class="fade">
      <h2 class="text-2xl font-bold serif mb-6">選擇服務項目</h2>
      <div v-for="cat in ['招牌','進階','基礎','護理','特殊']" :key="cat" class="mb-6">
        <div class="text-xs uppercase tracking-widest text-muted mb-3">{{cat}} 服務</div>
        <div class="space-y-2">
          <div v-for="s in services.filter(x=>x.category===cat)" :key="s.id"
            :class="['card p-4 cursor-pointer transition-all flex items-center justify-between',bookingForm.serviceId===s.id?'border-2 border-gold':'' ]"
            @click="bookingForm.serviceId=s.id">
            <div class="flex items-center gap-4">
              <div :class="['w-2 h-2 rounded-full',bookingForm.serviceId===s.id?'bg-gold':'bg-gray-600']"></div>
              <div>
                <div class="font-semibold">{{s.name}}</div>
                <div class="text-muted text-xs">{{s.en}} &middot; {{s.duration}}分鐘</div>
              </div>
            </div>
            <div class="text-gold font-bold">NT$ {{s.price.toLocaleString()}}</div>
          </div>
        </div>
      </div>
      <div class="flex justify-end mt-6">
        <button :disabled="!bookingForm.serviceId" :class="['btn btn-gold px-8 py-3',!bookingForm.serviceId?'opacity-40 cursor-not-allowed':'']" @click="bookingStep=2">下一步 →</button>
      </div>
    </div>

    <!-- Step 2: Designer -->
    <div v-if="bookingStep===2" class="fade">
      <h2 class="text-2xl font-bold serif mb-6">選擇設計師</h2>
      <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
        <div v-for="d in designers" :key="d.id"
          :class="['designer-card card p-5',d.available?'':'opacity-50 cursor-not-allowed',bookingForm.designerId===d.id?'selected':'']"
          @click="d.available&&(bookingForm.designerId=d.id)">
          <div class="flex items-start gap-4">
            <div class="w-14 h-14 rounded-full bg-gold flex items-center justify-center text-black font-bold text-xl flex-shrink-0">{{d.avatar}}</div>
            <div class="flex-1 min-w-0">
              <div class="flex items-center gap-2 mb-1">
                <div class="font-bold text-lg">{{d.name}}</div>
                <span class="text-xs px-2 py-0.5 rounded-full font-bold" :style="d.level==='A'?'background:rgba(201,168,76,.2);color:#C9A84C':d.level==='B'?'background:rgba(99,102,241,.2);color:#A78BFA':'background:rgba(34,197,94,.2);color:#86EFAC'">Lv.{{d.level}}</span>
              </div>
              <div class="text-muted text-xs mb-2">{{d.role}}</div>
              <div class="text-yellow-400 text-xs mb-2">★ {{d.rating}} <span class="text-muted">({{d.reviews}}則評價)</span></div>
              <div class="flex flex-wrap gap-1">
                <span v-for="sp in d.specialty.slice(0,3)" :key="sp" class="text-xs px-2 py-0.5 rounded-full" style="background:#252525;color:#aaa">{{sp}}</span>
              </div>
              <div v-if="!d.available" class="mt-2 text-xs text-red-400">目前休假中</div>
            </div>
          </div>
          <div class="mt-3 text-xs text-muted border-t border-gray-800 pt-3">{{d.bio}}</div>
        </div>
      </div>
      <div class="flex justify-between mt-6">
        <button class="btn btn-ghost" @click="bookingStep=1">← 上一步</button>
        <button :disabled="!bookingForm.designerId" :class="['btn btn-gold px-8 py-3',!bookingForm.designerId?'opacity-40 cursor-not-allowed':'']" @click="bookingStep=3">下一步 →</button>
      </div>
    </div>

    <!-- Step 3: Date & Time -->
    <div v-if="bookingStep===3" class="fade">
      <h2 class="text-2xl font-bold serif mb-6">選擇預約日期與時間</h2>
      <!-- Calendar -->
      <div class="card p-5 mb-4">
        <div class="flex items-center justify-between mb-4">
          <button class="btn btn-ghost px-3 py-2" @click="calendarMonth>1?calendarMonth--:null">←</button>
          <div class="font-semibold">{{calendarYear}}年 {{calendarMonth}}月</div>
          <button class="btn btn-ghost px-3 py-2" @click="calendarMonth<12?calendarMonth++:null">→</button>
        </div>
        <div class="grid grid-cols-7 gap-1 mb-2">
          <div v-for="w in ['日','一','二','三','四','五','六']" :key="w" class="text-center text-xs text-muted py-1">{{w}}</div>
        </div>
        <div class="grid grid-cols-7 gap-1">
          <div v-for="n in calDays.first" :key="'e'+n" class="calendar-cell disabled"></div>
          <div v-for="d in calDays.total" :key="d"
            :class="['calendar-cell',isDatePast(d)?'disabled':isSelectedD(d)?'selected':isTodayD(d)?'today':'hover:bg-gray-800']"
            @click="!isDatePast(d)&&selectDate(d)">{{d}}</div>
        </div>
      </div>
      <!-- Time slots -->
      <div v-if="bookingForm.date" class="card p-5 fade">
        <div class="text-sm font-semibold mb-3">可用時段 <span class="text-muted font-normal">{{bookingForm.date}}</span></div>
        <div class="grid grid-cols-4 gap-2 sm:grid-cols-6">
          <div v-for="t in ALL_TIMES" :key="t"
            :class="['time-slot',isTimeBooked(t)?'booked':bookingForm.time===t?'selected':'']"
            @click="!isTimeBooked(t)&&(bookingForm.time=t)">
            {{t}}
            <div v-if="isTimeBooked(t)" class="text-xs mt-0.5" style="color:#555">已訂</div>
          </div>
        </div>
      </div>
      <div v-else class="text-center text-muted text-sm py-8">請先在上方選擇日期</div>
      <div class="flex justify-between mt-6">
        <button class="btn btn-ghost" @click="bookingStep=2">← 上一步</button>
        <button :disabled="!bookingForm.date||!bookingForm.time" :class="['btn btn-gold px-8 py-3',(!bookingForm.date||!bookingForm.time)?'opacity-40 cursor-not-allowed':'']" @click="bookingStep=4">下一步 →</button>
      </div>
    </div>

    <!-- Step 4: Personal info -->
    <div v-if="bookingStep===4" class="fade">
      <h2 class="text-2xl font-bold serif mb-2">填寫預約資料</h2>
      <div class="card p-5 mb-4 text-sm">
        <div class="text-muted text-xs uppercase tracking-wider mb-3">預約摘要</div>
        <div class="flex justify-between py-1 border-b border-gray-800"><span class="text-muted">服務</span><span class="font-semibold">{{services.find(s=>s.id===bookingForm.serviceId)?.name}}</span></div>
        <div class="flex justify-between py-1 border-b border-gray-800"><span class="text-muted">設計師</span><span class="font-semibold">{{designers.find(d=>d.id===bookingForm.designerId)?.name}}</span></div>
        <div class="flex justify-between py-1 border-b border-gray-800"><span class="text-muted">日期時間</span><span class="font-semibold">{{bookingForm.date}} {{bookingForm.time}}</span></div>
        <div class="flex justify-between py-1"><span class="text-muted">費用</span><span class="font-bold text-gold">NT$ {{services.find(s=>s.id===bookingForm.serviceId)?.price?.toLocaleString()}}</span></div>
      </div>
      <div class="space-y-4">
        <div>
          <label class="block text-xs text-muted mb-1">姓名 *</label>
          <input v-model="bookingForm.name" placeholder="請輸入您的姓名" />
        </div>
        <div>
          <label class="block text-xs text-muted mb-1">手機號碼 *</label>
          <input v-model="bookingForm.phone" placeholder="09XX-XXX-XXX" />
        </div>
        <div>
          <label class="block text-xs text-muted mb-1">Email（可選，接收確認信）</label>
          <input v-model="bookingForm.email" placeholder="your@email.com" type="email" />
        </div>
        <div>
          <label class="block text-xs text-muted mb-1">備註 / 特殊需求</label>
          <textarea v-model="bookingForm.note" rows="3" placeholder="例如：想染玫瑰金、頭髮較細..."></textarea>
        </div>
      </div>
      <div class="flex justify-between mt-6">
        <button class="btn btn-ghost" @click="bookingStep=3">← 上一步</button>
        <button :disabled="!bookingForm.name||!bookingForm.phone" :class="['btn btn-gold px-8 py-3',(!bookingForm.name||!bookingForm.phone)?'opacity-40 cursor-not-allowed':'']" @click="submitBooking()">確認預約 ✓</button>
      </div>
    </div>

    <!-- Step 5: Done -->
    <div v-if="bookingStep===5 && bookingDone" class="fade text-center py-12">
      <div class="text-6xl mb-6">🎉</div>
      <h2 class="text-2xl font-bold serif gold mb-3">預約成功！</h2>
      <p class="text-muted mb-8">感謝您選擇 AKB 音樂發廊，期待為您服務。</p>
      <div class="card p-6 text-left max-w-sm mx-auto mb-8">
        <div class="text-xs text-muted uppercase tracking-wider mb-3">預約確認單</div>
        <div class="space-y-2 text-sm">
          <div class="flex justify-between"><span class="text-muted">預約編號</span><span class="font-mono text-xs text-gold">{{bookingDone.id}}</span></div>
          <div class="flex justify-between"><span class="text-muted">姓名</span><span>{{bookingDone.customerName}}</span></div>
          <div class="flex justify-between"><span class="text-muted">服務</span><span>{{bookingDone.serviceName}}</span></div>
          <div class="flex justify-between"><span class="text-muted">設計師</span><span>{{bookingDone.designerName}}</span></div>
          <div class="flex justify-between"><span class="text-muted">時間</span><span>{{bookingDone.date}} {{bookingDone.time}}</span></div>
          <div class="flex justify-between"><span class="text-muted">費用</span><span class="font-bold text-gold">NT$ {{bookingDone.price.toLocaleString()}}</span></div>
          <div class="flex justify-between"><span class="text-muted">狀態</span><span class="badge-status badge-pending">待確認</span></div>
        </div>
      </div>
      <div class="flex gap-3 justify-center">
        <button class="btn btn-gold px-8 py-3" @click="resetBooking()">再次預約</button>
        <button class="btn btn-ghost px-6 py-3" @click="portal='home'">返回首頁</button>
      </div>
    </div>
  </div>

  <!-- Designers modal -->
  <div v-if="showModal==='designers'" class="modal-overlay" @click.self="showModal=''">
    <div class="modal-box fade">
      <div class="flex items-center justify-between mb-5">
        <h3 class="text-xl font-bold serif gold">認識我們的設計師</h3>
        <button class="btn btn-ghost px-3 py-2" @click="showModal=''">✕</button>
      </div>
      <div class="space-y-4">
        <div v-for="d in designers" :key="d.id" class="flex gap-4 p-4 rounded-xl" style="background:#252525">
          <div class="w-14 h-14 rounded-full bg-gold flex items-center justify-center text-black font-bold text-xl flex-shrink-0">{{d.avatar}}</div>
          <div class="flex-1">
            <div class="flex items-center gap-2 mb-1">
              <span class="font-bold">{{d.name}}</span>
              <span class="text-muted text-xs">{{d.role}}</span>
              <span class="text-yellow-400 text-xs">★ {{d.rating}}</span>
            </div>
            <div class="text-muted text-xs mb-2">{{d.bio}}</div>
            <div class="flex flex-wrap gap-1">
              <span v-for="sp in d.specialty" :key="sp" class="text-xs px-2 py-0.5 rounded-full" style="background:#333;color:#aaa">{{sp}}</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ===== DESIGNER PORTAL ===== -->
<div v-if="portal==='designer'" class="min-h-screen bg-dark fade">
  <header class="border-b border-gray-800 sticky top-0 z-50" style="background:rgba(15,15,15,.95);backdrop-filter:blur(12px)">
    <div class="max-w-5xl mx-auto px-4 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 rounded-full bg-gold flex items-center justify-center text-black font-bold">{{currentDesigner?.avatar}}</div>
        <div>
          <div class="font-bold text-sm">{{currentDesigner?.name}}</div>
          <div class="text-muted text-xs">{{currentDesigner?.role}}</div>
        </div>
      </div>
      <div class="flex gap-1">
        <button :class="['nav-tab text-sm',designerTab==='schedule'?'active':'']" @click="designerTab='schedule'">班表</button>
        <button :class="['nav-tab text-sm',designerTab==='bookings'?'active':'']" @click="designerTab='bookings'">預約管理</button>
        <button :class="['nav-tab text-sm',designerTab==='profile'?'active':'']" @click="designerTab='profile'">個人資料</button>
      </div>
      <button class="btn btn-ghost text-xs px-3 py-2" @click="logout()">登出</button>
    </div>
  </header>

  <div class="max-w-5xl mx-auto px-4 py-6">
    <!-- Schedule tab -->
    <div v-if="designerTab==='schedule'" class="fade">
      <h2 class="text-xl font-bold serif mb-5">近7天班表</h2>
      <div class="grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4">
        <div v-for="day in getDesignerSchedule(currentDesigner?.id)" :key="day.date" class="card p-4">
          <div class="flex items-center justify-between mb-3">
            <div>
              <div class="font-bold text-sm">週{{day.day}}</div>
              <div class="text-muted text-xs">{{day.date}}</div>
            </div>
            <div :class="['text-xs px-2 py-1 rounded-full font-semibold',day.bookings.length>0?'text-gold':'text-muted']"
              :style="day.bookings.length>0?'background:rgba(201,168,76,.15)':''">
              {{day.bookings.length}} 筆
            </div>
          </div>
          <div v-if="day.bookings.length>0" class="space-y-2">
            <div v-for="b in day.bookings" :key="b.id" class="rounded-lg p-2 text-xs" style="background:#252525">
              <div class="font-semibold">{{b.time}} {{b.customerName}}</div>
              <div class="text-muted">{{b.serviceName}}</div>
              <div class="mt-1"><span :class="['badge-status',statusClass(b.status)]">{{statusLabel(b.status)}}</span></div>
            </div>
          </div>
          <div v-else class="text-muted text-xs text-center py-2">無預約</div>
        </div>
      </div>
    </div>

    <!-- Bookings tab -->
    <div v-if="designerTab==='bookings'" class="fade">
      <div class="flex items-center justify-between mb-5">
        <h2 class="text-xl font-bold serif">我的預約</h2>
        <div class="text-muted text-sm">共 {{designerBookings.length}} 筆</div>
      </div>
      <div v-if="designerBookings.length===0" class="text-center py-20 text-muted">
        <div class="text-4xl mb-3">📋</div>
        <div>目前沒有預約記錄</div>
      </div>
      <div v-else class="space-y-3">
        <div v-for="b in designerBookings" :key="b.id" class="card p-5 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
          <div class="flex-1">
            <div class="flex items-center gap-3 mb-2">
              <div class="font-bold">{{b.customerName}}</div>
              <span :class="['badge-status',statusClass(b.status)]">{{statusLabel(b.status)}}</span>
            </div>
            <div class="text-sm text-muted">{{b.serviceName}} &middot; {{b.date}} {{b.time}} &middot; NT$ {{b.price.toLocaleString()}}</div>
            <div v-if="b.note" class="text-xs text-muted mt-1">備註：{{b.note}}</div>
          </div>
          <div v-if="b.status==='pending'" class="flex gap-2 flex-shrink-0">
            <button class="btn btn-gold text-sm px-4 py-2" @click="updateBookingStatus(b.id,'confirmed')">確認</button>
            <button class="btn btn-danger text-sm" @click="updateBookingStatus(b.id,'cancelled')">取消</button>
          </div>
          <div v-else-if="b.status==='confirmed'" class="flex gap-2 flex-shrink-0">
            <button class="btn btn-ghost text-xs px-4 py-2" @click="updateBookingStatus(b.id,'done')">完成服務</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Profile tab -->
    <div v-if="designerTab==='profile'" class="fade">
      <h2 class="text-xl font-bold serif mb-5">個人資料</h2>
      <div class="grid grid-cols-1 gap-6 lg:grid-cols-2">
        <div class="card p-6">
          <div class="flex items-center gap-5 mb-6">
            <div class="w-20 h-20 rounded-full bg-gold flex items-center justify-center text-black font-bold text-3xl">{{currentDesigner?.avatar}}</div>
            <div>
              <div class="text-2xl font-bold serif">{{currentDesigner?.name}}</div>
              <div class="text-muted">{{currentDesigner?.role}}</div>
              <div class="text-yellow-400 text-sm mt-1">★ {{currentDesigner?.rating}} <span class="text-muted text-xs">({{currentDesigner?.reviews}} 則評價)</span></div>
            </div>
          </div>
          <div class="space-y-3 text-sm">
            <div class="flex justify-between border-b border-gray-800 pb-2"><span class="text-muted">等級</span><span class="text-gold font-bold">Level {{currentDesigner?.level}}</span></div>
            <div class="flex justify-between border-b border-gray-800 pb-2"><span class="text-muted">作品數</span><span>{{currentDesigner?.works}} 件</span></div>
            <div class="flex justify-between border-b border-gray-800 pb-2"><span class="text-muted">狀態</span>
              <span :class="currentDesigner?.available?'text-green-400':'text-red-400'">{{currentDesigner?.available?'上班中':'休假中'}}</span>
            </div>
          </div>
        </div>
        <div class="card p-6">
          <div class="text-sm font-semibold mb-4 text-muted uppercase tracking-wider">本月統計</div>
          <div class="space-y-4">
            <div class="flex justify-between items-center"><span class="text-muted text-sm">本月預約</span><span class="text-2xl font-bold text-gold">{{designerBookings.filter(b=>b.date.startsWith('2026-03')).length}}</span></div>
            <div class="flex justify-between items-center"><span class="text-muted text-sm">完成服務</span><span class="text-2xl font-bold text-green-400">{{designerBookings.filter(b=>b.status==='done').length}}</span></div>
            <div class="flex justify-between items-center"><span class="text-muted text-sm">待確認</span><span class="text-2xl font-bold text-yellow-400">{{designerBookings.filter(b=>b.status==='pending').length}}</span></div>
          </div>
          <div class="mt-5 pt-4 border-t border-gray-800">
            <div class="text-xs text-muted mb-2">擅長項目</div>
            <div class="flex flex-wrap gap-2">
              <span v-for="sp in currentDesigner?.specialty" :key="sp" class="text-xs px-3 py-1 rounded-full border border-gold text-gold">{{sp}}</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ===== ADMIN PORTAL ===== -->
<div v-if="portal==='admin'" class="min-h-screen bg-dark flex fade">
  <!-- Sidebar -->
  <aside class="w-56 border-r border-gray-800 flex-shrink-0 hidden md:flex flex-col" style="background:#141414;min-height:100vh">
    <div class="p-5 border-b border-gray-800">
      <div class="font-bold serif text-lg gold">AKB 管理後台</div>
      <div class="text-muted text-xs mt-1">店家管理員</div>
    </div>
    <nav class="p-3 flex-1 space-y-1">
      <div :class="['sidebar-item',adminTab==='dashboard'?'active':'']" @click="adminTab='dashboard'">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        儀表板
      </div>
      <div :class="['sidebar-item',adminTab==='bookings'?'active':'']" @click="adminTab='bookings'">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>
        預約管理
      </div>
      <div :class="['sidebar-item',adminTab==='designers'?'active':'']" @click="adminTab='designers'">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        設計師管理
      </div>
      <div :class="['sidebar-item',adminTab==='customers'?'active':'']" @click="adminTab='customers'">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        顧客資料
      </div>
      <div :class="['sidebar-item',adminTab==='services'?'active':'']" @click="adminTab='services'">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m12 2-3.4 6.9L2 10l5 4.9-1.2 6.9L12 18l6.2 3.8L17 14.9 22 10l-6.6-1.1z"/></svg>
        服務項目
      </div>
    </nav>
    <div class="p-3">
      <button class="sidebar-item w-full" @click="logout()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        登出
      </button>
    </div>
  </aside>

  <!-- Main content -->
  <div class="flex-1 overflow-auto">
    <!-- Mobile tab bar -->
    <div class="md:hidden flex border-b border-gray-800 overflow-x-auto" style="background:#141414">
      <button v-for="t in [{k:'dashboard',l:'總覽'},{k:'bookings',l:'預約'},{k:'designers',l:'設計師'},{k:'customers',l:'顧客'},{k:'services',l:'服務'}]" :key="t.k"
        :class="['nav-tab text-xs whitespace-nowrap',adminTab===t.k?'active':'']" @click="adminTab=t.k">{{t.l}}</button>
    </div>

    <div class="p-6">

      <!-- Dashboard -->
      <div v-if="adminTab==='dashboard'" class="fade">
        <h2 class="text-2xl font-bold serif mb-6">今日概覽</h2>
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
          <div class="stat-card stat-glow stat-gold" style="background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.2)">
            <div class="text-muted text-xs mb-2 uppercase tracking-wider">今日預約</div>
            <div class="text-3xl font-bold gold">{{stats.todayBookings}}</div>
            <div class="text-muted text-xs mt-1">筆預約</div>
          </div>
          <div class="stat-card stat-glow stat-green" style="background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2)">
            <div class="text-muted text-xs mb-2 uppercase tracking-wider">本月營收</div>
            <div class="text-3xl font-bold text-green-400">{{(stats.monthRevenue/1000).toFixed(0)}}K</div>
            <div class="text-muted text-xs mt-1">NT$</div>
          </div>
          <div class="stat-card stat-glow stat-blue" style="background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.2)">
            <div class="text-muted text-xs mb-2 uppercase tracking-wider">顧客總數</div>
            <div class="text-3xl font-bold text-blue-400">{{stats.totalCustomers}}</div>
            <div class="text-muted text-xs mt-1">位顧客</div>
          </div>
          <div class="stat-card stat-glow stat-purple" style="background:rgba(139,92,246,.08);border:1px solid rgba(139,92,246,.2)">
            <div class="text-muted text-xs mb-2 uppercase tracking-wider">待確認</div>
            <div class="text-3xl font-bold text-purple-400">{{stats.pendingCount}}</div>
            <div class="text-muted text-xs mt-1">筆待處理</div>
          </div>
        </div>

        <!-- Recent bookings -->
        <h3 class="text-lg font-bold mb-4">近期預約</h3>
        <div class="card overflow-hidden">
          <table>
            <thead>
              <tr>
                <th>顧客</th><th>設計師</th><th>服務</th><th>日期時間</th><th>金額</th><th>狀態</th><th>操作</th>
              </tr>
            </thead>
            <tbody>
              <tr v-for="b in bookings.slice(0,6)" :key="b.id">
                <td class="font-semibold">{{b.customerName}}</td>
                <td class="text-muted">{{b.designerName}}</td>
                <td>{{b.serviceName}}</td>
                <td class="text-muted text-sm">{{b.date}} {{b.time}}</td>
                <td class="text-gold font-semibold">{{b.price.toLocaleString()}}</td>
                <td><span :class="['badge-status',statusClass(b.status)]">{{statusLabel(b.status)}}</span></td>
                <td>
                  <div class="flex gap-1">
                    <button v-if="b.status==='pending'" class="btn btn-gold text-xs px-3 py-1" @click="updateBookingStatus(b.id,'confirmed')">確認</button>
                    <button v-if="b.status==='pending'" class="btn btn-danger text-xs px-2 py-1" @click="updateBookingStatus(b.id,'cancelled')">取消</button>
                    <button v-if="b.status==='confirmed'" class="btn btn-ghost text-xs px-3 py-1" @click="updateBookingStatus(b.id,'done')">完成</button>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- All Bookings -->
      <div v-if="adminTab==='bookings'" class="fade">
        <div class="flex items-center justify-between mb-5 flex-wrap gap-3">
          <h2 class="text-2xl font-bold serif">預約管理</h2>
          <input v-model="searchQ" class="max-w-xs" placeholder="搜尋顧客 / 設計師 / 服務..." style="width:220px;padding:8px 14px"/>
        </div>
        <div class="card overflow-x-auto">
          <table>
            <thead>
              <tr><th>顧客</th><th>手機</th><th>設計師</th><th>服務</th><th>日期時間</th><th>金額</th><th>狀態</th><th>備註</th><th>操作</th></tr>
            </thead>
            <tbody>
              <tr v-for="b in filteredBookings" :key="b.id">
                <td class="font-semibold">{{b.customerName}}</td>
                <td class="text-muted text-sm">{{b.phone}}</td>
                <td>{{b.designerName}}</td>
                <td>{{b.serviceName}}</td>
                <td class="text-sm text-muted">{{b.date}} {{b.time}}</td>
                <td class="text-gold font-semibold text-sm">{{b.price.toLocaleString()}}</td>
                <td><span :class="['badge-status',statusClass(b.status)]">{{statusLabel(b.status)}}</span></td>
                <td class="text-xs text-muted max-w-[120px] truncate">{{b.note||'—'}}</td>
                <td>
                  <div class="flex gap-1">
                    <button v-if="b.status==='pending'" class="btn btn-gold text-xs px-3 py-1" @click="updateBookingStatus(b.id,'confirmed')">確認</button>
                    <button v-if="b.status==='pending'||b.status==='confirmed'" class="btn btn-danger text-xs px-2 py-1" @click="updateBookingStatus(b.id,'cancelled')">取消</button>
                    <button v-if="b.status==='confirmed'" class="btn btn-ghost text-xs px-3 py-1" @click="updateBookingStatus(b.id,'done')">完成</button>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- Designers management -->
      <div v-if="adminTab==='designers'" class="fade">
        <div class="flex items-center justify-between mb-5">
          <h2 class="text-2xl font-bold serif">設計師管理</h2>
          <button class="btn btn-gold px-5 py-2" @click="openEditDesigner(null)">+ 新增設計師</button>
        </div>
        <div class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3">
          <div v-for="d in designers" :key="d.id" class="card p-5">
            <div class="flex items-start gap-4 mb-4">
              <div class="w-14 h-14 rounded-full bg-gold flex items-center justify-center text-black font-bold text-xl flex-shrink-0">{{d.avatar}}</div>
              <div class="flex-1">
                <div class="flex items-center gap-2 flex-wrap">
                  <span class="font-bold text-lg">{{d.name}}</span>
                  <span class="text-xs px-2 py-0.5 rounded-full" :style="d.level==='A'?'background:rgba(201,168,76,.2);color:#C9A84C':d.level==='B'?'background:rgba(99,102,241,.2);color:#A78BFA':'background:rgba(34,197,94,.2);color:#86EFAC'">Lv.{{d.level}}</span>
                </div>
                <div class="text-muted text-xs mt-0.5">{{d.role}}</div>
                <div class="text-yellow-400 text-xs mt-1">★ {{d.rating}} <span class="text-muted">({{d.reviews}})</span></div>
              </div>
            </div>
            <div class="text-xs text-muted mb-3">{{d.bio}}</div>
            <div class="flex flex-wrap gap-1 mb-4">
              <span v-for="sp in d.specialty" :key="sp" class="text-xs px-2 py-0.5 rounded-full" style="background:#252525;color:#aaa">{{sp}}</span>
            </div>
            <div class="flex items-center justify-between">
              <div :class="['text-xs px-3 py-1 rounded-full font-semibold cursor-pointer',d.available?'text-green-400':'text-red-400']"
                :style="d.available?'background:rgba(34,197,94,.15)':'background:rgba(239,68,68,.15)'"
                @click="d.available=!d.available;showToast(d.name+(d.available?' 標記為上班中':' 標記為休假中'))">
                {{d.available?'上班中':'休假中'}}
              </div>
              <button class="btn btn-ghost text-xs px-3 py-1" @click="openEditDesigner(d)">編輯</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Customers -->
      <div v-if="adminTab==='customers'" class="fade">
        <div class="flex items-center justify-between mb-5">
          <h2 class="text-2xl font-bold serif">顧客資料</h2>
          <div class="text-muted text-sm">共 {{customers.length}} 位顧客</div>
        </div>
        <div class="card overflow-x-auto">
          <table>
            <thead>
              <tr><th>姓名</th><th>手機</th><th>Email</th><th>來訪次數</th><th>最後到訪</th><th>累計消費</th><th>備註</th></tr>
            </thead>
            <tbody>
              <tr v-for="c in customers" :key="c.id">
                <td class="font-semibold">{{c.name}}</td>
                <td class="text-muted">{{c.phone}}</td>
                <td class="text-muted text-sm">{{c.email||'—'}}</td>
                <td class="text-center">
                  <span class="text-gold font-bold">{{c.visits}}</span>
                </td>
                <td class="text-muted text-sm">{{c.lastVisit}}</td>
                <td class="font-semibold text-green-400">NT$ {{c.totalSpent.toLocaleString()}}</td>
                <td class="text-xs text-muted max-w-[150px] truncate">{{c.notes||'—'}}</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- Services -->
      <div v-if="adminTab==='services'" class="fade">
        <div class="flex items-center justify-between mb-5">
          <h2 class="text-2xl font-bold serif">服務項目管理</h2>
          <button class="btn btn-gold px-5 py-2" @click="openEditService(null)">+ 新增服務</button>
        </div>
        <div class="card overflow-x-auto">
          <table>
            <thead><tr><th>服務名稱</th><th>英文名</th><th>類別</th><th>時長</th><th>定價</th><th>操作</th></tr></thead>
            <tbody>
              <tr v-for="s in services" :key="s.id">
                <td class="font-semibold">{{s.name}}</td>
                <td class="text-muted text-sm">{{s.en}}</td>
                <td>
                  <span class="text-xs px-2 py-0.5 rounded-full"
                    :style="s.category==='招牌'?'background:rgba(201,168,76,.2);color:#C9A84C':s.category==='特殊'?'background:rgba(99,102,241,.2);color:#A78BFA':s.category==='護理'?'background:rgba(34,197,94,.2);color:#86EFAC':'background:#252525;color:#aaa'">
                    {{s.category}}
                  </span>
                </td>
                <td class="text-muted">{{s.duration}} 分鐘</td>
                <td class="text-gold font-bold">NT$ {{s.price.toLocaleString()}}</td>
                <td>
                  <button class="btn btn-ghost text-xs px-3 py-1" @click="openEditService(s)">編輯</button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

    </div><!-- /p-6 -->
  </div><!-- /flex-1 -->
</div>

<!-- ===== Edit Service Modal ===== -->
<div v-if="editService.show" class="modal-overlay" @click.self="editService.show=false">
  <div class="modal-box fade">
    <div class="flex items-center justify-between mb-5">
      <h3 class="text-xl font-bold serif gold">{{editService.id?'編輯服務':'新增服務'}}</h3>
      <button class="btn btn-ghost px-3 py-2" @click="editService.show=false">✕</button>
    </div>
    <div class="space-y-4">
      <div>
        <label class="block text-xs text-muted mb-1">服務名稱 *</label>
        <input v-model="editService.name" placeholder="例如：染髮" />
      </div>
      <div>
        <label class="block text-xs text-muted mb-1">英文名稱</label>
        <input v-model="editService.en" placeholder="例如：Hair Color" />
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-xs text-muted mb-1">定價 (NT$)</label>
          <input v-model.number="editService.price" type="number" min="0" />
        </div>
        <div>
          <label class="block text-xs text-muted mb-1">時長（分鐘）</label>
          <input v-model.number="editService.duration" type="number" min="30" step="30" />
        </div>
      </div>
      <div>
        <label class="block text-xs text-muted mb-1">類別</label>
        <select v-model="editService.category">
          <option v-for="c in ['基礎','進階','護理','招牌','特殊']" :key="c">{{c}}</option>
        </select>
      </div>
    </div>
    <div class="flex gap-3 justify-end mt-6">
      <button class="btn btn-ghost px-5 py-2" @click="editService.show=false">取消</button>
      <button class="btn btn-gold px-6 py-2" @click="saveService()">儲存</button>
    </div>
  </div>
</div>

<!-- ===== Edit Designer Modal ===== -->
<div v-if="editDesigner.show" class="modal-overlay" @click.self="editDesigner.show=false">
  <div class="modal-box fade">
    <div class="flex items-center justify-between mb-5">
      <h3 class="text-xl font-bold serif gold">{{editDesigner.id?'編輯設計師':'新增設計師'}}</h3>
      <button class="btn btn-ghost px-3 py-2" @click="editDesigner.show=false">✕</button>
    </div>
    <div class="space-y-4">
      <div>
        <label class="block text-xs text-muted mb-1">姓名 *</label>
        <input v-model="editDesigner.name" placeholder="設計師名稱" />
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-xs text-muted mb-1">職位</label>
          <select v-model="editDesigner.role">
            <option v-for="r in ['設計師','資深設計師','首席設計師','店長']" :key="r">{{r}}</option>
          </select>
        </div>
        <div>
          <label class="block text-xs text-muted mb-1">等級</label>
          <select v-model="editDesigner.level">
            <option v-for="l in ['A','B','C']" :key="l">{{l}}</option>
          </select>
        </div>
      </div>
      <div>
        <label class="block text-xs text-muted mb-1">擅長項目（用「、」分隔）</label>
        <input v-model="editDesigner.specialty" placeholder="例如：染髮、燙髮、造型" />
      </div>
      <div>
        <label class="block text-xs text-muted mb-1">個人簡介</label>
        <textarea v-model="editDesigner.bio" rows="2" placeholder="簡短介紹設計師風格與專長..."></textarea>
      </div>
      <div class="flex items-center gap-3">
        <label class="text-xs text-muted">狀態</label>
        <button :class="['btn text-xs px-4 py-2',editDesigner.available?'btn-gold':'btn-ghost']" @click="editDesigner.available=!editDesigner.available">
          {{editDesigner.available?'上班中':'休假中'}}
        </button>
      </div>
    </div>
    <div class="flex gap-3 justify-end mt-6">
      <button class="btn btn-ghost px-5 py-2" @click="editDesigner.show=false">取消</button>
      <button class="btn btn-gold px-6 py-2" @click="saveDesigner()">儲存</button>
    </div>
  </div>
</div>
`
};

createApp(App).mount('#app');
</script>
</body>
</html>
