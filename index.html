<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>AKB 多元化音樂發廊</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500;600&display=swap');
*{font-family:'Noto Sans TC',sans-serif;box-sizing:border-box;}
.serif{font-family:'Noto Serif TC',serif;}
.gold{color:#C9A84C;}
.bg-gold{background:#C9A84C;}
.bg-gold-grad{background:linear-gradient(135deg,#C9A84C,#E8D5A3);}
.text-gold{color:#C9A84C;}
.bg-dark{background:#0F0F0F;}
.text-muted{color:#888;}
.shimmer{background:linear-gradient(90deg,#C9A84C,#E8D5A3,#C9A84C);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-size:200%;}
.btn{cursor:pointer;transition:all 0.2s;border:none;font-weight:600;border-radius:8px;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;}
.btn-gold{background:linear-gradient(135deg,#C9A84C,#E8D5A3);color:#0F0F0F;padding:14px 28px;font-size:16px;}
.btn-gold:hover{opacity:.85;transform:translateY(-1px);box-shadow:0 4px 14px rgba(201,168,76,.4);}
.btn-outline{background:transparent;color:#C9A84C;border:1px solid #C9A84C;padding:13px 26px;font-size:16px;}
.btn-outline:hover{background:rgba(201,168,76,.1);}
.fade{animation:fadeUp .5s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.portal-card{background:#1C1C1C;border:1px solid #2A2A2A;border-radius:16px;padding:32px;transition:all 0.3s;cursor:pointer;text-decoration:none;color:white;display:block;}
.portal-card:hover{border-color:#C9A84C;transform:translateY(-4px);box-shadow:0 12px 32px rgba(0,0,0,.4);}
.portal-icon{width:64px;height:64px;border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;}
</style>
</head>
<body class="bg-dark text-white min-h-screen">

<!-- 入口頁面 -->
<div class="min-h-screen flex flex-col items-center justify-center fade" style="background:radial-gradient(ellipse at top,#1a1400 0%,#0F0F0F 60%)">
  
  <!-- Logo -->
  <div class="text-center mb-12">
    <div class="text-6xl font-bold serif shimmer mb-3">AKB</div>
    <div class="text-2xl text-gold font-semibold tracking-widest mb-2">多元化音樂發廊</div>
    <div class="text-muted text-sm tracking-wider">Music • Style • Identity</div>
  </div>

  <!-- 三個入口 -->
  <div class="grid grid-cols-1 md:grid-cols-3 gap-6 w-full max-w-4xl px-6">
    
    <!-- 客戶預約端 -->
    <a href="./client/index.html" class="portal-card text-center">
      <div class="portal-icon bg-gold-grad">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#0F0F0F" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
      </div>
      <h3 class="text-xl font-bold mb-2">客戶預約</h3>
      <p class="text-muted text-sm">線上預約服務，選擇設計師與時段</p>
      <div class="mt-4 text-gold text-sm">立即預約 →</div>
    </a>

    <!-- 設計師端 -->
    <a href="./designer/index.html" class="portal-card text-center">
      <div class="portal-icon" style="background:linear-gradient(135deg,#3B82F6,#1D4ED8);">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M12 1v4m0 14v4M4.22 4.22l2.83 2.83m9.9 9.9 2.83 2.83M1 12h4m14 0h4M4.22 19.78l2.83-2.83m9.9-9.9 2.83-2.83"/>
        </svg>
      </div>
      <h3 class="text-xl font-bold mb-2">設計師工作台</h3>
      <p class="text-muted text-sm">查看班表、管理預約、個人資料</p>
      <div class="mt-4 text-blue-400 text-sm">進入工作台 →</div>
    </a>

    <!-- 店家後台 -->
    <a href="./admin/login.html" class="portal-card text-center">
      <div class="portal-icon" style="background:linear-gradient(135deg,#8B5CF6,#6D28D9);">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
          <rect x="3" y="3" width="7" height="7"/>
          <rect x="14" y="3" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/>
          <rect x="3" y="14" width="7" height="7"/>
        </svg>
      </div>
      <h3 class="text-xl font-bold mb-2">店家管理後台</h3>
      <p class="text-muted text-sm">預約管理、設計師管理、數據報表</p>
      <div class="mt-4 text-purple-400 text-sm">管理員登入 →</div>
    </a>

  </div>

  <!-- 聯絡資訊 -->
  <div class="mt-16 text-center text-muted text-xs">
    <div class="mb-1">📍 台北市信義區音樂路88號</div>
    <div>☎ 02-2345-6789 &nbsp;|&nbsp; 週二～週日 10:00–20:00</div>
  </div>
</div>

</body>
</html>
