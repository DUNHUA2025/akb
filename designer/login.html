<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<link rel="icon" href="../favicon.ico" type="image/x-icon"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>設計師登入 - AKB 多元化音樂發廊</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Noto+Serif+TC:wght@600;700&family=Noto+Sans+TC:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/vue@3.4.21/dist/vue.global.prod.min.js"></script>
<script src="../auth.js?v=20260325c"></script>
<style>
/* ══ AKB 墨玉主題 ══ */
:root{
  --bg:#0E1117;--bg2:#141921;--surface:#1A2332;--surface2:#1F2A3C;
  --border:#243044;--border2:#2E3D56;
  --text:#E8EDF5;--text2:#9DAFC8;--text3:#5A6E8A;
  --jade:#2DD4BF;--jade2:#5EEAD4;--jade3:#99F6E4;
  --amber:#F59E0B;--amber2:#FCD34D;--rose:#FB7185;--green:#34D399;
  --glass:rgba(26,35,50,.75);--glass-border:rgba(45,212,191,.16);
  --shadow:rgba(0,0,0,.5);
}
html.light{
  --bg:#F7F8FA;--bg2:#EDEEF2;--surface:#FFFFFF;--surface2:#F0F2F6;
  --border:#DDE1EB;--border2:#C8CEDC;
  --text:#111827;--text2:#374151;--text3:#6B7280;
  --jade:#0D9488;--jade2:#14B8A6;--jade3:#2DD4BF;
  --amber:#D97706;--amber2:#F59E0B;
  --glass:rgba(255,255,255,.84);--glass-border:rgba(13,148,136,.2);
  --shadow:rgba(0,0,0,.12);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Noto Sans TC','DM Sans',sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh;
  transition:background .4s,color .4s;
}
.serif{font-family:'Noto Serif TC',serif;}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
@keyframes gradShift{0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}}
@keyframes shimmer{0%{background-position:-200% 0;}100%{background-position:200% 0;}}
@keyframes orbFloat{0%,100%{transform:translate(0,0);}50%{transform:translate(18px,-14px);}}
@keyframes skeleton{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
@keyframes spin{to{transform:rotate(360deg);}}
.fade{animation:fadeUp .45s cubic-bezier(.16,1,.3,1) both;}

/* 背景光暈 */
.orb{position:fixed;border-radius:50%;filter:blur(90px);pointer-events:none;z-index:0;}
.orb-a{width:440px;height:440px;background:radial-gradient(circle,rgba(45,212,191,.11) 0%,transparent 70%);top:-100px;right:-80px;animation:orbFloat 13s ease-in-out infinite;}
.orb-b{width:320px;height:320px;background:radial-gradient(circle,rgba(245,158,11,.07) 0%,transparent 70%);bottom:-70px;left:-70px;animation:orbFloat 11s ease-in-out infinite reverse;}
html.light .orb-a{background:radial-gradient(circle,rgba(13,148,136,.08) 0%,transparent 70%);}
html.light .orb-b{background:radial-gradient(circle,rgba(217,119,6,.05) 0%,transparent 70%);}

/* 漸層文字 */
.jade-text{background:linear-gradient(135deg,var(--jade),var(--jade2),var(--amber));background-size:200% 200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:gradShift 4.5s ease infinite;}
.amber-text{background:linear-gradient(90deg,var(--amber) 0%,var(--amber2) 50%,var(--amber) 100%);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 3.5s linear infinite;}

/* 玻璃卡片 */
.glass-card{
  background:var(--glass);border:1px solid var(--glass-border);
  border-radius:24px;backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
}

/* 設計師按鈕 */
.designer-btn{
  background:var(--surface);border:1.5px solid var(--border);border-radius:14px;
  padding:14px 16px;cursor:pointer;transition:all .22s;
  display:flex;align-items:center;gap:12px;position:relative;overflow:hidden;
}
.designer-btn:hover{border-color:var(--jade);background:var(--surface2);}
.designer-btn.selected{
  border-color:var(--jade);background:rgba(45,212,191,.06);
  box-shadow:0 0 0 3px rgba(45,212,191,.14);
}

/* 頭像環 */
.avatar-ring{
  width:44px;height:44px;border-radius:50%;
  background:linear-gradient(135deg,var(--jade),var(--jade2));
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-weight:800;font-size:17px;flex-shrink:0;
  box-shadow:0 2px 10px rgba(45,212,191,.3);
}
html.light .avatar-ring{color:#042f2e;}

/* 勾選標記 */
.check-mark{
  width:22px;height:22px;border-radius:50%;
  background:linear-gradient(135deg,var(--jade),var(--jade2));
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-left:auto;font-size:11px;font-weight:700;color:#fff;
}
html.light .check-mark{color:#042f2e;}

/* 等級標籤 */
.level-tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;display:inline-block;}

/* 輸入框 */
.field-input{
  width:100%;background:var(--surface2);border:1.5px solid var(--border);
  color:var(--text);border-radius:12px;padding:12px 46px 12px 16px;
  font-size:14px;outline:none;transition:all .2s;font-family:inherit;
}
.field-input::placeholder{color:var(--text3);}
.field-input:focus{border-color:var(--jade);box-shadow:0 0 0 3px rgba(45,212,191,.12);}

/* 主按鈕 */
.btn-main{
  width:100%;background:linear-gradient(135deg,var(--jade),var(--jade2));
  color:#fff;font-weight:700;font-size:15px;border-radius:14px;
  border:none;padding:14px;cursor:pointer;transition:all .25s;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
html.light .btn-main{color:#042f2e;}
.btn-main:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 8px 24px rgba(45,212,191,.35);}
.btn-main:disabled{opacity:.4;cursor:not-allowed;transform:none;}

/* 返回按鈕 */
.btn-back{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--surface2);border:1px solid var(--border);
  color:var(--text2);border-radius:12px;padding:9px 18px;
  font-size:13px;cursor:pointer;text-decoration:none;transition:all .2s;
}
.btn-back:hover{border-color:var(--jade);color:var(--jade);}

/* 骨架屏 */
.skel{
  border-radius:14px;
  background:linear-gradient(90deg,var(--surface) 25%,var(--surface2) 50%,var(--surface) 75%);
  background-size:200% 100%;animation:skeleton 1.4s infinite;
}

/* 主題按鈕 */
.theme-btn{
  position:fixed;top:16px;right:16px;z-index:999;
  width:36px;height:36px;border-radius:50%;
  background:var(--surface2);border:1.5px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:15px;transition:all .2s;
}
.theme-btn:hover{border-color:var(--jade);transform:scale(1.1);}
</style>
</head>
<body>
<div class="orb orb-a"></div>
<div class="orb orb-b"></div>

<button class="theme-btn" id="themeBtn" onclick="toggleTheme()" title="切換主題">🌙</button>

<div id="app">
  <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;">
    <div style="width:100%;max-width:420px;position:relative;z-index:1;">

      <!-- 返回 -->
      <a href="../index.html" class="btn-back fade" style="margin-bottom:24px;display:inline-flex;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m15 18-6-6 6-6"/></svg>
        返回首頁
      </a>

      <!-- 標題 -->
      <div class="fade text-center" style="margin-bottom:28px;animation-delay:.06s;">
        <div class="serif jade-text" style="font-size:38px;font-weight:700;margin-bottom:6px;">AKB</div>
        <div style="font-size:11px;letter-spacing:.35em;color:var(--text3);text-transform:uppercase;">設計師工作台</div>
      </div>

      <!-- 登入卡片 -->
      <div class="glass-card fade" style="padding:28px;animation-delay:.1s;">
        <div style="font-weight:700;font-size:16px;margin-bottom:20px;text-align:center;color:var(--text2);">選擇設計師帳號</div>

        <!-- 錯誤提示 -->
        <div v-if="error" class="fade" style="margin-bottom:16px;padding:12px 16px;border-radius:12px;font-size:13px;text-align:center;background:rgba(251,113,133,.08);border:1px solid rgba(251,113,133,.25);color:var(--rose);">
          {{error}}
        </div>

        <!-- 骨架屏 -->
        <div v-if="loadingDesigners" style="display:flex;flex-direction:column;gap:8px;margin-bottom:20px;">
          <div v-for="i in 3" :key="i" class="skel" style="height:68px;"></div>
        </div>

        <!-- 設計師列表 -->
        <div v-else style="display:flex;flex-direction:column;gap:8px;margin-bottom:20px;">
          <div v-for="d in designers" :key="d.id"
            :class="['designer-btn',selectedDesigner?.id===d.id?'selected':'']"
            @click="selectDesigner(d)">
            <div class="avatar-ring">{{d.avatar}}</div>
            <div style="flex:1;min-width:0;">
              <div style="display:flex;align-items:center;gap:8px;">
                <span style="font-weight:700;font-size:14px;color:var(--text);">{{d.name}}</span>
                <span class="level-tag"
                  :style="d.level==='A'?'background:rgba(245,158,11,.12);color:var(--amber)':d.level==='B'?'background:rgba(45,212,191,.12);color:var(--jade2)':'background:rgba(52,211,153,.12);color:var(--green)'">
                  Lv.{{d.level||'C'}}
                </span>
              </div>
              <div style="font-size:12px;margin-top:3px;color:var(--text3);">{{d.role}}</div>
            </div>
            <div v-if="selectedDesigner?.id===d.id" class="check-mark">✓</div>
          </div>
        </div>

        <!-- 冷啟動提示 -->
        <div v-if="waking" style="margin-bottom:16px;padding:12px 16px;border-radius:12px;font-size:13px;background:rgba(45,212,191,.07);border:1px solid rgba(45,212,191,.22);color:var(--jade2);">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
            <svg style="animation:spin 1s linear infinite;flex-shrink:0;" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
            <span style="font-weight:600;">服務器啟動中，請稍候…</span>
          </div>
          <div style="font-size:12px;color:var(--text3);">{{countdown}} 秒後自動重試</div>
          <div style="margin-top:8px;height:3px;border-radius:2px;background:var(--border);overflow:hidden;">
            <div style="height:100%;background:linear-gradient(90deg,var(--jade),var(--jade2));border-radius:2px;transition:width .9s;" :style="{width:(countdown/30*100)+'%'}"></div>
          </div>
        </div>

        <!-- 密碼輸入 -->
        <div v-if="selectedDesigner" class="fade" style="animation-delay:0s;">
          <div style="margin-bottom:16px;">
            <label style="display:block;font-size:12px;margin-bottom:8px;color:var(--text3);">{{selectedDesigner.name}} 的登入密碼</label>
            <div style="position:relative;">
              <input class="field-input" v-model="password" :type="showPwd?'text':'password'" placeholder="請輸入密碼" @keyup.enter="login"/>
              <button type="button" @click="showPwd=!showPwd"
                style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text3);padding:4px;transition:color .2s;"
                onmouseover="this.style.color='var(--jade)'" onmouseout="this.style.color='var(--text3)'">
                <svg v-if="!showPwd" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                <svg v-else width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
              </button>
            </div>
          </div>
          <button class="btn-main" @click="login" :disabled="loading">
            <span v-if="loading" style="display:flex;align-items:center;justify-content:center;gap:8px;">
              <svg style="animation:spin 1s linear infinite;" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
              登入中...
            </span>
            <span v-else>進入工作台 →</span>
          </button>
        </div>

        <!-- 底部提示 -->
        <div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--border);text-align:center;">
          <p style="font-size:12px;color:var(--text3);">如忘記密碼請聯絡店長重置</p>
        </div>
      </div>

      <div style="margin-top:20px;text-align:center;font-size:11px;color:var(--text3);">AKB 多元化音樂發廊 © 2026</div>
    </div>
  </div>
</div>

<script>
(function(){
  function applyTheme(t){
    if(t==='light') document.documentElement.classList.add('light');
    else document.documentElement.classList.remove('light');
    var btn=document.getElementById('themeBtn');
    if(btn) btn.textContent=(t==='light'?'☀️':'🌙');
  }
  window.toggleTheme=function(){
    var isLight=document.documentElement.classList.contains('light');
    var next=isLight?'dark':'light';
    applyTheme(next);localStorage.setItem('akb_theme',next);
  };
  applyTheme(localStorage.getItem('akb_theme')||'dark');
})();
</script>

<script>
const { createApp, ref, onMounted, onUnmounted } = Vue;
const API_BASE = 'https://akb-salon-server.onrender.com';

createApp({
  setup() {
    const designers = ref([]);
    const selectedDesigner = ref(null);
    const password = ref('');
    const showPwd = ref(false);
    const error = ref('');
    const loading = ref(false);
    const loadingDesigners = ref(true);
    const waking = ref(false);
    const countdown = ref(30);

    let countdownTimer = null;
    let savedUsername = '';
    let savedPassword = '';
    let accountMap = {};

    if (Auth.isLoggedIn() && Auth.hasPermission('designer')) {
      window.location.href = './index.html';
    }

    onMounted(async () => {
      fetch(API_BASE + '/api/health', { method: 'GET', signal: AbortSignal.timeout(5000) })
        .catch(() => { console.info('[Login] 後端冷啟動中'); });

      try {
        const [designerRes, accountRes] = await Promise.all([
          fetch(API_BASE + '/api/designers').then(r => r.json()),
          fetch(API_BASE + '/api/accounts').then(r => r.json()),
        ]);
        accountMap = {};
        Object.entries(accountRes).forEach(([username, acc]) => {
          if (acc.designerId) accountMap[acc.designerId] = username;
        });
        designers.value = designerRes
          .filter(d => d.status !== 'resigned')
          .map(d => ({
            id: d.id, name: d.name, role: d.role,
            avatar: d.avatar || d.name[0], level: d.level || 'C',
            username: accountMap[d.id] || d.name.toLowerCase(),
          }));
      } catch(e) {
        console.warn('[Login] 無法載入設計師列表:', e);
        const cached = localStorage.getItem('akb_designers_data');
        if (cached) {
          const all = JSON.parse(cached);
          designers.value = all
            .filter(d => d.status !== 'resigned')
            .map(d => ({ id: d.id, name: d.name, role: d.role, avatar: d.avatar || d.name[0], level: d.level || 'C', username: d.name.toLowerCase() }));
        } else {
          designers.value = [
            { id:1, name:'A Li 亞力', role:'首席設計師', avatar:'A', username:'aika', level:'A' },
            { id:2, name:'QiQi', role:'資深設計師', avatar:'Q', username:'ken', level:'B' },
            { id:3, name:'Bella', role:'設計師', avatar:'B', username:'bella', level:'C' },
            { id:4, name:'Jay', role:'資深設計師', avatar:'J', username:'jay', level:'B' },
          ];
        }
      } finally {
        loadingDesigners.value = false;
      }
    });

    onUnmounted(() => { if (countdownTimer) clearInterval(countdownTimer); });

    function startWakeCountdown(u, p) {
      waking.value = true; countdown.value = 30; savedUsername = u; savedPassword = p;
      if (countdownTimer) clearInterval(countdownTimer);
      countdownTimer = setInterval(() => {
        countdown.value--;
        if (countdown.value <= 0) {
          clearInterval(countdownTimer); countdownTimer = null; waking.value = false;
          doLogin(savedUsername, savedPassword);
        }
      }, 1000);
    }

    function doLogin(u, p) {
      loading.value = true; error.value = '';
      Auth.loginAsync(u, p).then(result => {
        loading.value = false;
        if (result.success) {
          if (result.role === 'designer' || result.role === 'admin') { window.location.href = './index.html'; }
          else { error.value = '您沒有設計師權限'; Auth.logout(); }
        } else {
          if (result.error && result.error.includes('啟動')) startWakeCountdown(u, p);
          else error.value = result.error || '帳號或密碼錯誤';
        }
      });
    }

    function selectDesigner(d) {
      selectedDesigner.value = d; error.value = ''; password.value = ''; waking.value = false;
      if (countdownTimer) { clearInterval(countdownTimer); countdownTimer = null; }
    }

    function login() {
      error.value = ''; waking.value = false;
      if (countdownTimer) { clearInterval(countdownTimer); countdownTimer = null; }
      if (!selectedDesigner.value) { error.value = '請選擇設計師'; return; }
      if (!password.value) { error.value = '請輸入密碼'; return; }
      doLogin(selectedDesigner.value.username, password.value);
    }

    return { designers, selectedDesigner, password, showPwd, error, loading, loadingDesigners, waking, countdown, selectDesigner, login };
  }
}).mount('#app');
</script>
</body>
</html>
