name: Daily Backup

on:
  schedule:
    - cron: '17 18 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Export backup snapshot
        env:
          AKB_API_BASE: ${{ vars.AKB_API_BASE || 'https://akb-salon-server.onrender.com' }}
          BACKUP_OUTPUT_DIR: ${{ github.workspace }}/backup-output
          GIT_SHA: ${{ github.sha }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/backup-export.js

      - name: Archive backup bundle
        run: |
          latest_dir=$(find backup-output -mindepth 1 -maxdepth 1 -type d | sort | tail -n 1)
          echo "Latest backup directory: ${latest_dir}"
          tar -C "$(dirname "$latest_dir")" -czf "${latest_dir}.tar.gz" "$(basename "$latest_dir")"

      - name: Upload backup artifacts
        uses: actions/upload-artifact@v4
        with:
          name: akb-backup-${{ github.run_number }}
          path: |
            backup-output/
          retention-days: 30

      - name: Update latest backup manifest state
        run: |
          mkdir -p .ops/state
          latest_manifest=$(find backup-output -name manifest.json | sort | tail -n 1)
          cp "$latest_manifest" .ops/state/latest-backup-manifest.json

      - name: Commit latest backup manifest state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .ops/state/latest-backup-manifest.json
          if git diff --cached --quiet; then
            echo "No manifest changes to commit"
            exit 0
          fi
          git commit -m "chore: update latest backup manifest [skip ci]"
          git push

      - name: Write workflow summary
        run: |
          echo "## AKB Daily Backup" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          latest_manifest=$(find backup-output -name manifest.json | sort | tail -n 1)
          echo "- Manifest: \\`${latest_manifest}\\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Stored as GitHub Artifact for 30 days" >> "$GITHUB_STEP_SUMMARY"
          echo "- Latest state mirrored to \\`.ops/state/latest-backup-manifest.json\\`" >> "$GITHUB_STEP_SUMMARY"
