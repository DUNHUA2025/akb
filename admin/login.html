<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<link rel="icon" href="../favicon.ico" type="image/x-icon"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>店家管理員登入 - AKB 多元化音樂發廊</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script src="../auth.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500;600&display=swap');
*{font-family:'Noto Sans TC',sans-serif;box-sizing:border-box;}
.serif{font-family:'Noto Serif TC',serif;}
.gold{color:#C9A84C;}
.bg-gold{background:#C9A84C;}
.bg-gold-grad{background:linear-gradient(135deg,#C9A84C,#E8D5A3);}
.text-gold{color:#C9A84C;}
.bg-dark{background:#0F0F0F;}
.bg-card{background:#1C1C1C;}
.text-muted{color:#888;}
input{background:#252525;border:1px solid #333;color:#fff;border-radius:10px;padding:12px 16px;width:100%;outline:none;transition:border 0.2s;font-family:inherit;font-size:15px;}
input:focus{border-color:#C9A84C;box-shadow:0 0 0 3px rgba(201,168,76,.15);}
.btn{cursor:pointer;transition:all 0.2s;border:none;font-weight:600;border-radius:8px;}
.btn-gold{background:linear-gradient(135deg,#C9A84C,#E8D5A3);color:#0F0F0F;padding:12px 24px;}
.btn-gold:hover{opacity:.85;transform:translateY(-1px);box-shadow:0 4px 14px rgba(201,168,76,.4);}
.btn-ghost{background:transparent;color:#888;border:1px solid #333;padding:10px 20px;}
.btn-ghost:hover{border-color:#C9A84C;color:#C9A84C;}
.fade{animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.card{background:#1C1C1C;border:1px solid #2A2A2A;border-radius:20px;}
.shimmer{
  background:linear-gradient(90deg,#C9A84C 0%,#F0DFA0 40%,#C9A84C 60%,#E8D5A3 100%);
  background-size:200% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:shimmerMove 3s linear infinite;
}
@keyframes shimmerMove{0%{background-position:0%}100%{background-position:200%}}
</style>
</head>
<body class="bg-dark text-white min-h-screen">
<div id="app">
  <!-- Login Page -->
  <div class="min-h-screen flex items-center justify-center fade" style="background:radial-gradient(ellipse at top,#1a1400 0%,#0F0F0F 60%)">
    <div class="w-full max-w-sm px-6">
      <button @click="goHome" class="btn btn-ghost mb-6 text-sm">← 返回首頁</button>
      
      <div class="text-center mb-8">
        <div class="text-4xl font-bold serif shimmer mb-2">AKB</div>
        <div class="text-gold text-sm tracking-wider">店家管理員登入</div>
      </div>
      
      <div class="card p-8">
        <div class="text-xl font-bold mb-6 text-center">管理員登入</div>
        
        <div v-if="error" class="mb-4 p-3 rounded-lg bg-red-900/30 border border-red-700 text-red-300 text-sm text-center">
          {{error}}
        </div>
        
        <div class="space-y-4">
          <div>
            <label class="block text-xs text-muted mb-2">帳號</label>
            <input v-model="username" placeholder="請輸入管理員帳號" @keyup.enter="login"/>
          </div>
          <div>
            <label class="block text-xs text-muted mb-2">密碼</label>
            <input v-model="password" type="password" placeholder="請輸入密碼" @keyup.enter="login"/>
          </div>
        </div>
        
        <button class="btn btn-gold w-full mt-6 py-3" @click="login" :disabled="loading">
          {{loading ? '登入中...' : '登入'}}
        </button>
        
        <div class="mt-5 pt-4 border-t text-center" style="border-color:#1a1a1a;">
          <div class="text-xs" style="color:#3a3a3a;">© 2026 AKB 多元化音樂發廊</div>
        </div>
      </div>
      
      <div class="mt-8 text-center text-muted text-xs">
        <div>AKB 多元化音樂發廊 管理系統</div>
      </div>
    </div>
  </div>
</div>

<script>
const { createApp, ref } = Vue;

createApp({
  setup() {
    const username = ref('');
    const password = ref('');
    const error = ref('');
    const loading = ref(false);
    
    // 如果已登入，直接進入管理後台
    if (Auth.isLoggedIn() && Auth.hasPermission('admin')) {
      window.location.href = './index.html';
    }
    
    function login() {
      error.value = '';
      
      if (!username.value || !password.value) {
        error.value = '請輸入帳號和密碼';
        return;
      }
      
      loading.value = true;
      
      // 使用後端 API 登入，確保密碼同步（loginAsync 優先呼叫後端）
      Auth.loginAsync(username.value, password.value).then(result => {
        loading.value = false;
        
        if (result.success) {
          if (result.role === 'admin') {
            window.location.href = './index.html';
          } else {
            error.value = '您沒有管理員權限';
            Auth.logout();
          }
        } else {
          error.value = result.error || '登入失敗';
        }
      });
    }
    
    function goHome() {
      window.location.href = '../index.html';
    }
    
    return { username, password, error, loading, login, goHome };
  }
}).mount('#app');
</script>
</body>
</html>
